services:
  twitter-gallery:
    build: .
    image: ghcr.io/hsyoungtick/twitter-gallery:latest
    container_name: twitter-gallery
    ports:
      - "5173:5173"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5173
    restart: unless-stopped
